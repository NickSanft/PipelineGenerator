# Generated by pipeline-gen — dogfooding our own tool
# This workflow lints, tests, and builds the pipeline-gen monorepo on every push and PR.
# SHA-pinned actions per ADR 003 (docs/adr/003-sha-pinning.md).

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test-build:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@a3252b7022e8fc5ff491f03b5f4fbd6f58f0b236 # v3.0.0
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test (core)
        run: pnpm --filter @pipeline-gen/core test

      - name: Test (web)
        run: pnpm --filter @pipeline-gen/web test

      - name: Build (core)
        run: pnpm --filter @pipeline-gen/core build

  lint-generated-ci:
    name: Lint this CI workflow with pipeline-gen
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-test-build

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@a3252b7022e8fc5ff491f03b5f4fbd6f58f0b236 # v3.0.0
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter pipeline-gen build

      - name: Lint this workflow with pipeline-gen
        run: node apps/cli/dist/cli/index.js lint .github/workflows/ci.yml
